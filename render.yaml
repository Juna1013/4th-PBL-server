services:
  - type: web
    name: line-tracer-api
    runtime: python3
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python -m app.main
    plan: starter
    region: oregon
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://your-frontend-domain.com
      - key: PYTHONPATH
        value: /opt/render/project/src
    disk:
      name: speech-model-disk
      mountPath: /opt/render/project/src/models
      sizeGB: 1
